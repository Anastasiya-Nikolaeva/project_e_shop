{% extends 'blog/base.html' %}
{% load static %}

{% block title %}Подтверждение удаления{% endblock %}

{% block content %}
<div class="container mt-5">
    <h1>Подтверждение удаления</h1>
    <p>Вы уверены, что хотите удалить "{{ post.title }}"?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Удалить</button>
    </form>
    <a href="{% url 'blog:unpublished_post_list' %}" class="btn btn-secondary">Отмена</a>
</div>
{% endblock %}
