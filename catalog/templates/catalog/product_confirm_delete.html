{% extends "catalog/base.html" %}

{% block title %}Подтверждение удаления продукта{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2>Подтверждение удаления продукта</h2>
    <p>Вы уверены, что хотите удалить "{{ object.name }}"?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Удалить</button>
        <a href="{% url 'catalog:products_list' %}" class="btn btn-secondary">Отмена</a>
    </form>
</div>
{% endblock %}
