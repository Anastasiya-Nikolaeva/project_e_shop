{% load static %}
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Продукты в категории</title>
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
</head>
<body>
    <div class="container mt-5">
        <h1>Список продуктов</h1>
        <ul>
            {% for product in products %}
                <li>
                    <a href="{% url 'catalog:product_detail' product.id %}">{{ product.name }}</a> - {{ product.price }} руб.
                </li>
            {% empty %}
                <li>Нет продуктов в этой категории.</li>
            {% endfor %}
        </ul>
        <a href="{% url 'catalog:products_list' %}" class="btn btn-primary">К списку продуктов</a>
    </div>
</body>
</html>
